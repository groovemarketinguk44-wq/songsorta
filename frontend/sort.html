<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SongSorta – Sorting</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav>
  <a href="/" class="logo">SongSorta</a>
  <div class="nav-right">
    <a href="/" class="btn btn-ghost btn-sm">← Dashboard</a>
  </div>
</nav>

<div class="sort-container">
  <!-- Sort Screen -->
  <div id="sort-screen">
    <div class="sort-topbar">
      <div class="sort-topbar-left">
        <a href="/" style="color:var(--text-muted);font-size:1.2rem">←</a>
        <span class="file-name-label" id="file-name-label"></span>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-xs" onclick="doUndo()">↩ Undo</button>
        <button class="btn btn-ghost btn-xs" onclick="doRestart()">↺ Restart</button>
      </div>
    </div>

    <div class="sort-progress">
      <div class="sort-progress-text">
        <span id="progress-text">Song 1 of —</span>
        <span id="added-count" style="color:var(--accent)">0 added</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="song-card" id="song-card">
      <div class="song-artist" id="song-artist">—</div>
      <div class="song-title" id="song-title"></div>
    </div>

    <!-- Playlist selector (shown when no speed dial set) -->
    <div class="playlist-selector-wrap" style="margin-top:16px">
      <select id="playlist-select"></select>
    </div>

    <div class="sort-actions">
      <button class="btn-skip" onclick="doAction('skip', null)">✕ Skip</button>
      <button class="btn-add" onclick="doAction('add', selectedPlaylistId)">✓ Add</button>
    </div>

    <div class="key-hint" style="margin-top:10px">
      <kbd>←</kbd> Skip &nbsp; <kbd>→</kbd> Add &nbsp; <kbd>1</kbd>–<kbd>9</kbd> Speed dial &nbsp; <kbd>⌘Z</kbd> Undo
    </div>

    <!-- Speed dial -->
    <div class="speed-dial-section" id="speed-dial-section" style="display:none">
      <div class="speed-dial-label">Speed Dial</div>
      <div class="speed-dial-grid" id="speed-dial-grid"></div>
    </div>
  </div>

  <!-- Complete Screen -->
  <div id="complete-screen" style="display:none">
    <div class="complete-card">
      <div style="font-size:3rem;margin-bottom:12px">🎵</div>
      <h2>All done!</h2>
      <p id="complete-remaining" style="margin-bottom:24px"></p>
      <div class="complete-actions">
        <button class="btn btn-primary" id="complete-sort-remaining" onclick="doRestart()">Sort Remaining Songs</button>
        <a href="/" class="btn btn-secondary">Back to Dashboard</a>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/sort.js"></script>
<script>
  if (!requireAuth()) throw new Error('not authed');
</script>
</body>
</html>
